<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>BOSS 求职助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>BOSS 求职助手</h1>
      <p id="status">尚未检查本地工作台</p>
      <dl class="metrics">
        <div><dt>已批准</dt><dd id="approvedCount">--</dd></div>
        <div><dt>今日确认 / 上限</dt><dd id="quota">-- / --</dd></div>
        <div><dt>暂停原因</dt><dd id="pausedReason">--</dd></div>
      </dl>
      <button id="collectJobs">采集可见岗位</button>
      <button id="runApproved">执行已审批任务</button>
      <button id="openWorkbench">打开工作台</button>
      <div class="note">发送前必须先在工作台审批。遇到验证码或页面异常会暂停。</div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
